const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function tryOpen(pw, remember){
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64(SALT), iterations:310000, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64(IV)}, key, b64(CT));
  if(remember){ try{ localStorage.setItem("essk", pw); }catch(e){} }
  if(location.hash) history.replaceState(null, "", location.pathname + location.search);
  document.open(); document.write(new TextDecoder().decode(plain)); document.close();
}
function fail(){ const e = document.getElementById("err");
  e.textContent = "Mot de passe incorrect"; document.getElementById("pw").value = ""; }
document.getElementById("go").onclick = () =>
  tryOpen(document.getElementById("pw").value, true).catch(fail);
document.getElementById("pw").addEventListener("keydown",
  ev => { if(ev.key === "Enter") document.getElementById("go").click(); });
(async () => {   // déverrouillage silencieux : #k= dans le marque-page, sinon mémoire locale
  const h = new URLSearchParams(location.hash.slice(1)).get("k");
  if(h){ try{ await tryOpen(h, true); return; }catch(e){} }
  const s = localStorage.getItem("essk");
  if(s){ try{ await tryOpen(s, false); }catch(e){ localStorage.removeItem("essk"); } }
})();
